# =============================================================================
# ERP System — Production Docker Compose
# =============================================================================
# Usage:
#   Production:   docker compose up -d
#   Dev override: docker compose -f docker-compose.yml -f docker-compose.override.yml up
#
# Required: copy backend/.env.production.example → backend/.env and fill values
# =============================================================================

version: '3.9'

services:

  # ── PostgreSQL (pgvector enabled) ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-erp_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user} -d ${DB_NAME:-erp_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - erp_internal
    # Do NOT expose port 5432 in production — internal only
    # ports:
    #   - "5432:5432"

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_internal

  # ── Backend (Node.js/Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    image: ${DOCKERHUB_USERNAME:-local}/erp-backend:${IMAGE_TAG:-latest}
    container_name: erp_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      # Override localhost values from .env with Docker service names
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-erp_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-erp_db}
      DATABASE_URL: postgresql://${DB_USER:-erp_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-erp_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - uploads_data:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: >
        node -e "require('http').get('http://localhost:5000/api/health',
          (r) => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - erp_internal
    # Not exposed to internet directly — nginx proxies requests
    # ports:
    #   - "5000:5000"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        VITE_API_URL: ""        # Empty = relative URLs, nginx proxies /api → backend
        VITE_SOCKET_URL: ""     # Empty = same origin WebSocket
    image: ${DOCKERHUB_USERNAME:-local}/erp-frontend:${IMAGE_TAG:-latest}
    container_name: erp_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates — put fullchain.pem + privkey.pem here
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - erp_internal
    deploy:
      resources:
        limits:
          memory: 128M

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  erp_internal:
    driver: bridge
    internal: false   # Set true to isolate from internet (frontend is the gateway)

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  backend_logs:
    driver: local
