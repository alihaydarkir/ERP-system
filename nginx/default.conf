# =============================================================================
# Nginx — Production Configuration
# =============================================================================
# Rate limiting zones
limit_req_zone $binary_remote_addr zone=global:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m     rate=120r/m;

# Upstream backend
upstream erp_backend {
    server backend:5000;
    keepalive 32;
}

# ── HTTP server (redirects to HTTPS when SSL is configured) ───────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect to HTTPS — uncomment after adding SSL certificates
    # return 301 https://$host$request_uri;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Static assets (long cache) ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # ── Auth endpoints — strict rate limit ────────────────────────────────
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://erp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://erp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Allow larger file uploads (Excel import)
        client_max_body_size 20M;
    }

    # ── WebSocket (Socket.IO) ─────────────────────────────────────────────
    location /socket.io {
        proxy_pass         http://erp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "Upgrade";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── SPA fallback (React Router) ───────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        limit_req zone=global burst=20 nodelay;
        try_files $uri $uri/ /index.html;

        # No cache for index.html (SPA entry point)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}

